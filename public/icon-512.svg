<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 - 전체 채움 (흰 테두리 없음) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 면제권 티켓 카드 -->
  <rect x="56" y="72" width="400" height="368" rx="32" fill="#1c1014" stroke="url(#gold)" stroke-width="7"/>

  <!-- 안쪽 점선 테두리 -->
  <rect x="76" y="92" width="360" height="328" rx="22" fill="none" stroke="#eab308" stroke-width="2.5" stroke-dasharray="14,8" opacity="0.65"/>

  <!-- 상단 가위표시 (티켓 절취선) -->
  <line x1="56" y1="210" x2="76" y2="210" stroke="#eab308" stroke-width="3" opacity="0.5"/>
  <circle cx="56" cy="210" r="22" fill="url(#bg)"/>
  <circle cx="456" cy="210" r="22" fill="url(#bg)"/>
  <line x1="436" y1="210" x2="456" y2="210" stroke="#eab308" stroke-width="3" opacity="0.5"/>
  <line x1="76" y1="210" x2="436" y2="210" stroke="#eab308" stroke-width="2" stroke-dasharray="12,6" opacity="0.4"/>

  <!-- 🎫 이모지 -->
  <text x="256" y="188" text-anchor="middle" dominant-baseline="middle" font-size="96" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, system-ui">🎫</text>

  <!-- 면제권 텍스트 -->
  <text x="256" y="300" text-anchor="middle" font-size="72" font-weight="900" fill="url(#gold)" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" filter="url(#glow)">면제권</text>

  <!-- 죽기스 작은 텍스트 -->
  <text x="256" y="370" text-anchor="middle" font-size="34" font-weight="700" fill="#a16207" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" opacity="0.85">💀 죽기스</text>

  <!-- 모서리 장식 별 -->
  <text x="90" y="120" text-anchor="middle" font-size="22" opacity="0.5" font-family="system-ui">✦</text>
  <text x="422" y="120" text-anchor="middle" font-size="22" opacity="0.5" font-family="system-ui">✦</text>
  <text x="90" y="426" text-anchor="middle" font-size="22" opacity="0.5" font-family="system-ui">✦</text>
  <text x="422" y="426" text-anchor="middle" font-size="22" opacity="0.5" font-family="system-ui">✦</text>
</svg>
